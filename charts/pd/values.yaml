## @section Global parameters
## Global Docker image parameters
## Please, note that this will override the image parameters, including dependencies, configured to use the global value
## Current available global Docker image parameters: imageRegistry, imagePullSecrets and storageClass
##

## @param global.imageRegistry Global Docker image registry
## @param global.imagePullSecrets Global Docker registry secret names as an array
## @param global.storageClass Global StorageClass for Persistent Volume(s)
##
global:
  imageRegistry: ""
  ## E.g.
  ## imagePullSecrets:
  ##   - myRegistryKeySecretName
  ##
  imagePullSecrets: []
  storageClass: ""

## @section Common parameters
##
## @param nameOverride String to partially override common.names.name
##
nameOverride: ""
## @param fullnameOverride String to fully override common.names.fullname
##
fullnameOverride: ""
## @param commonLabels Labels to add to all deployed objects
##
commonLabels: {}
## @param commonAnnotations Annotations to add to all deployed objects
##
commonAnnotations: {}
## Diagnostic mode
## @param diagnosticMode.enabled Enable diagnostic mode (all probes will be disabled and the command will be overridden)
## @param diagnosticMode.command Command to override all containers in the chart release
## @param diagnosticMode.args Args to override all containers in the chart release
##
diagnosticMode:
  enabled: false
  command:
    - sleep
  args:
    - infinity

## @section PD Parameters
##

## PD/POD_DESCRIPTION%%
##
pd:
  ## @param pd.pod Pod configuration
  ## @param pd.pod.enabled Run PD as a Pod rather than a Deployment
  ## @param pd.pod.restartPolicy PD pod container restart policy.
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#restart-policy
  ##
  pod:
    enabled: true
    restartPolicy: Never
  ## @param pd.hostNetwork Specify if host network should be enabled for pd pod
  ##
  hostNetwork: true
  ## @param pd.dnsConfig  Allows users more control on the DNS settings for a Pod.
  ## Ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  ## E.g.
  ## dnsConfig:
  ##   nameservers:
  ##     - 192.0.2.1 # this is an example
  ##   searches:
  ##     - ns1.svc.cluster-domain.example
  ##     - my.dns.search.suffix
  ##   options:
  ##     - name: ndots
  ##       value: "2"
  ##     - name: edns0
  ##
  dnsConfig: {}
  ## @param pd.dnsPolicy Deployment pod DNS policy
  ## ref: https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/
  ## E.g.
  ## dnsPolicy: ClusterFirstWithHostNet
  ##
  dnsPolicy: ""
  ## PD image
  ## ref: https://hub.docker.com/r/pingcap/pd/tags
  ## @param pd.image.registry PD image registry
  ## @param pd.image.repository PD image repository
  ## @param pd.image.tag PD image tag (immutable tags are recommended)
  ## @param pd.image.digest PD image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag image tag (immutable tags are recommended)
  ## @param pd.image.pullPolicy PD image pull policy
  ## @param pd.image.pullSecrets PD image pull secrets
  ##
  image:
    registry: docker.io
    repository: pingcap/pd
    tag: v8.5.6
    digest: ""
    ## Specify a imagePullPolicy
    ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
    ## ref: http://kubernetes.io/docs/user-guide/images/#pre-pulling-images
    ##
    pullPolicy: IfNotPresent
    ## Optionally specify an array of imagePullSecrets.
    ## Secrets must be manually created in the namespace.
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
    ## e.g:
    ## pullSecrets:
    ##   - myRegistryKeySecretName
    ##
    pullSecrets: []
  ## @param pd.replicaCount Number of PD replicas to deploy if workloadKind set to deployment
  ##
  replicaCount: 1
  ## @param pd.containerPorts PD container port to expose to host
  ## e.g.
  ## containerPorts:
  ##   - name: http
  ##     containerPort: 80
  ##     hostPort: 80
  ##     hostIP: 127.0.0.1
  ##     protocol: TCP
  ##   - name: https
  ##     containerPort: 443
  ##     hostPort: 443
  ##     hostIP: 127.0.0.1
  ##     protocol: TCP
  ##
  containerPorts: []
  ## Configure extra options for PD containers' liveness and readiness probes
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
  ## @param pd.livenessProbe.enabled Enable livenessProbe on PD containers
  ## @param pd.livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
  ## @param pd.livenessProbe.periodSeconds Period seconds for livenessProbe
  ## @param pd.livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
  ## @param pd.livenessProbe.failureThreshold Failure threshold for livenessProbe
  ## @param pd.livenessProbe.successThreshold Success threshold for livenessProbe
  ##
  livenessProbe:
    enabled: true
    initialDelaySeconds: 3
    periodSeconds: 600
    timeoutSeconds: 10
    failureThreshold: 5
    successThreshold: 1
    httpGet:
      path: /pd/api/v1/members
      port: 2379
  ## @param pd.readinessProbe.enabled Enable readinessProbe on PD containers
  ## @param pd.readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
  ## @param pd.readinessProbe.periodSeconds Period seconds for readinessProbe
  ## @param pd.readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
  ## @param pd.readinessProbe.failureThreshold Failure threshold for readinessProbe
  ## @param pd.readinessProbe.successThreshold Success threshold for readinessProbe
  ## note: podman not support readinessProbe currently
  ##
  readinessProbe:
    enabled: false
    initialDelaySeconds: foo
    periodSeconds: bar
    timeoutSeconds: foo
    failureThreshold: bar
    successThreshold: foo
  ## @param pd.startupProbe.enabled Enable startupProbe on PD containers
  ## @param pd.startupProbe.initialDelaySeconds Initial delay seconds for startupProbe
  ## @param pd.startupProbe.periodSeconds Period seconds for startupProbe
  ## @param pd.startupProbe.timeoutSeconds Timeout seconds for startupProbe
  ## @param pd.startupProbe.failureThreshold Failure threshold for startupProbe
  ## @param pd.startupProbe.successThreshold Success threshold for startupProbe
  ##
  startupProbe:
    enabled: false
    initialDelaySeconds: foo
    periodSeconds: bar
    timeoutSeconds: foo
    failureThreshold: bar
    successThreshold: foo
  ## @param pd.customLivenessProbe Custom livenessProbe that overrides the default one
  ##
  customLivenessProbe: {}
  ## @param pd.customReadinessProbe Custom readinessProbe that overrides the default one
  ##
  customReadinessProbe: {}
  ## @param pd.customStartupProbe Custom startupProbe that overrides the default one
  ##
  customStartupProbe: {}
  ## PD resource requests and limits
  ## ref: http://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/
  ## @param pd.resourcesPreset Set PD container resources according to one common preset (allowed values: none, nano, small, medium, large, xlarge, 2xlarge). This is ignored if pd.resources is set (pd.resources is recommended for production).
  ## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
  ##
  resourcesPreset: "small"
  ## @param pd.resources Set PD container requests and limits for different resources like CPU or memory (essential for production workloads)
  ## Example:
  ## resources:
  ##   requests:
  ##     cpu: 2
  ##     memory: 512Mi
  ##   limits:
  ##     cpu: 3
  ##     memory: 1024Mi
  ##
  resources: {}
  ## Configure Pods Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ## @param pd.podSecurityContext.enabled Enabled PD pods' Security Context
  ## @param pd.podSecurityContext.fsGroup Set PD pod's Security Context fsGroup
  ## note: podman kube play does not support fsGroup yet
  ##
  podSecurityContext:
    enabled: false
    # fsGroup: 1001
  ## Configure Container Security Context
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
  ## @param pd.containerSecurityContext.enabled Enabled PD containers' Security Context
  ## @param pd.containerSecurityContext.runAsUser Set PD containers' Security Context runAsUser
  ## @param pd.containerSecurityContext.runAsNonRoot Set PD containers' Security Context runAsNonRoot
  ## @param pd.containerSecurityContext.readOnlyRootFilesystem Set PD containers' Security Context runAsNonRoot
  ##
  containerSecurityContext:
    enabled: false
    runAsUser: 1001
    runAsNonRoot: true
    readOnlyRootFilesystem: false

  # %%OTHER_PARAMETERS_RELATED_TO_THIS_CONTAINER/POD%%

  ## @param pd.configFile An PD configuration file place in /etc/pd/config.toml
  ## the config file will pass to PD workload by args --config-file /etc/pd/config.toml
  ## ref:
  ##  https://github.com/tikv/pd/blob/v8.5.6/conf/config.toml
  ##
  configFile:
    ## @param pd.configFile.name The name of the PD member, Default: "pd-${hostname}"
    ## It is used to generate the default data directory and client URLs if they are not set.
    ##
    name: null
    ## @param pd.configFile.dataDir The directory to store the pd data, default: "default.${name}".
    ## path to the data directory, default: "default.${name}".
    ##
    data-dir: /data
    ## @param pd.configFile.client-urls The list of client URLs to be listened to by PD
    ##
    client-urls: "http://127.0.0.1:2379"
    ## @param pd.configFile.advertise-client-urls The list of advertise URLs for the client to access PD
    ## if not set, use ${client-urls}
    ##
    advertise-client-urls: null
    ## @param pd.configFile.peer-urls The list of URLs to be listened to by the peer to access PD
    ## default: "http://127.0.0.1:2380"
    ##
    peer-urls: "http://127.0.0.1:2380"
    ## @param pd.configFile.advertise-peer-urls The list of advertise URLs for the peer to access PD
    ## if not set, use ${peer-urls}
    ##
    advertise-peer-urls: null
    ## @param pd.configFile.initial-cluster The initial cluster configuration for bootstrapping.
    ## default: "{name}=http://{advertise-peer-url}"
    ## For example, if name is "pd", and advertise-peer-urls is "http://192.168.100.113:2380", the initial-cluster is "pd=http://192.168.100.113:2380".
    ##
    initial-cluster: null
    ## The initial cluster configuration for bootstrapping.
    # initial-cluster = ""
    # initial-cluster-state = "new"
    ## Set different tokens to prevent communication between PDs in different clusters.
    # initial-cluster-token = "pd-cluster"
    ## starts a new cluster even if previously started; unsafe.
    # force-new-cluster = false

    ## @param pd.configFile.join Join the cluster dynamically
    ## If you want to join an existing cluster, you can use --join="${advertise-client-urls}",
    ## the advertise-client-url is any existing PD's, multiply advertise client urls are separated by comma.
    join: null
    security:
      ## @param pd.configFile.security.cacert-path Path of file that contains list of trusted SSL CAs. if set, following four settings shouldn't be empty
      ##
      cacert-path: null
      ## @param pd.configFile.security.cert-path Path of file that contains X509 certificate in PEM format.
      ##
      cert-path: null
      ## @param pd.configFile.security.key-path Path of file that contains X509 key in PEM format.
      ##
      key-path: null
      ## @param pd.configFile.security.cert-allowed-cn A CN which must be provided by a client
      ## e.g. cert-allowed-cn = ["example.com"]
      ##
      cert-allowed-cn: null
      ## @param pd.configFile.security.redact-info-log Whether to enable the log redaction.
      ## It can be the following values:
      ##   - false: disable redact log.
      ##   - true: enable redact log, which will replace the sensitive information with "?".
      ##   - "MARKER": enable redact log, which will use single guillemets ‹› to enclose the sensitive information.
      ##
      redact-info-log: null
      encryption:
        ## @param pd.configFile.security.encryption.data-encryption-method Encryption method to use for PD data. One of "plaintext", "aes128-ctr", "aes192-ctr" and "aes256-ctr".
        ## Defaults to "plaintext" if not set.
        ##
        data-encryption-method: "plaintext"
        ## @param pd.configFile.security.encryption.data-key-rotation-period Specifies how often PD rotates data encryption key. Default is 7 days.
        ##
        data-key-rotation-period: "168h"
        master-key:
          ## @param pd.configFile.security.encryption.master-key.type Specifies master key if encryption is enabled.
          ## There are three types of master key:
          ##   * "plaintext":
          ##
          ##     Plaintext as a master key means no master key is given and only applicable when
          ##     encryption is not enabled, i.e. data-encryption-method = "plaintext". This type doesn't
          ##     have sub-config items. Example:
          ##
          ##     [security.encryption.master-key]
          ##     type = "plaintext"
          ##
          ##   * "kms":
          ##
          ##     Use a KMS service to supply a master key. Currently, only AWS KMS is supported. This type of
          ##     master key is recommended for production use. Example:
          ##
          ##     [security.encryption.master-key]
          ##     type = "kms"
          ##     ## KMS CMK key id. Must be a valid KMS CMK where the TiKV process has access to.
          ##     ## In production is recommended to grant access of the CMK to TiKV using IAM.
          ##     key-id = "1234abcd-12ab-34cd-56ef-1234567890ab"
          ##     ## AWS region of the KMS CMK.
          ##     region = "us-west-2"
          ##     ## (Optional) AWS KMS service endpoint. Only required when non-default KMS endpoint is
          ##     ## desired.
          ##     endpoint = "https://kms.us-west-2.amazonaws.com"
          ##
          ##   * "file":
          ##
          ##     Supply a custom encryption key stored in a file. It is recommended NOT to use in production,
          ##     as it breaks the purpose of encryption at rest unless the file is stored in tempfs.
          ##     The file must contain a 256-bits (32 bytes, regardless of key length implied by
          ##     data-encryption-method) key encoded as a hex string and end with a newline ("\n"). Example:
          ##
          ##     [security.encryption.master-key]
          ##     type = "file"
          ##     path = "/path/to/master/key/file"
          ##
          # type: "plaintext"
    log:
      ## @param pd.configFile.log.level The log level. Optional values: "debug", "info", "warn", "error", "fatal".
      ## Default: "info"
      ##
      level: "info"
      ## @param pd.configFile.log.format log format, one of json, text, console
      ##
      format: "text"
      file:
        ## @param pd.configFile.log.file.filename The log file name. Usually it is set through command line.
        ##
        # filename: ""
        ## @param pd.configFile.log.file.max-size The max log file size in MB. Usually it is set through command line.
        ##
        # max-size: 300
        ## @param pd.configFile.log.file.max-days The max number of days to keep log files.
        ##
        # max-days: 0
        ## @param pd.configFile.log.file.max-backups The maximum number of old log files to retain.
        ##
        # max-backups: 0
    pd-server:
      ## @param pd.configFile.pd-server.metric-storage The metric storage is the cluster metric storage. This is use for query metric data.
      ## The metric storage is the cluster metric storage. This is use for query metric data.
      ## Currently we use prometheus as metric storage, we may use PD/TiKV as metric storage later.
      ## For usability, recommended to temporarily set it to the prometheus address, eg: http://127.0.0.1:9090
      ##
      metric-storage: null
      ## @param pd.configFile.pd-server.dashboard-address There are some values supported: "auto", "none", or a specific address, default: "auto".
      ##
      dashboard-address: "auto"
    schedule:
      ## @param pd.configFile.schedule.max-merge-region-size
      ## Controls the size limit of Region Merge.
      ##
      # max-merge-region-size: 54
      ## @param pd.configFile.schedule.max-merge-region-keys
      ## Specifies the upper limit of the Region Merge key.
      ##
      # max-merge-region-keys: 540000
      ## @param pd.configFile.schedule.max-pending-peer-count
      ## Controls the time interval between the split and merge operations on the same Region.
      ##
      # split-merge-interval: "1h"
      ## @param pd.configFile.schedule.max-store-down-time
      ## When PD fails to receive the heartbeat from a store after the specified period of time,
      ## it adds replicas at other nodes.
      ##
      # max-store-down-time: "30m"
      ## @param pd.configFile.schedule.max-merge-schedule-interval
      ## Controls the time interval between write hot regions info into leveldb
      ##
      # hot-regions-write-interval: "10m"
      ## @param pd.configFile.schedule.hot-regions-reserved-days
      ## The day of hot regions data to be reserved. 0 means close.
      ##
      # hot-regions-reserved-days: 7
      ## @param pd.configFile.schedule.leader-schedule-limit
      ## The number of Leader scheduling tasks performed at the same time.
      ##
      # leader-schedule-limit: 4
      ## @param pd.configFile.schedule.region-schedule-limit
      ## The number of Region scheduling tasks performed at the same time.
      ##
      # region-schedule-limit: 2048
      ## @param pd.configFile.schedule.replica-schedule-limit
      ## The number of Replica scheduling tasks performed at the same time.
      ##
      # replica-schedule-limit: 64
      ## @param pd.configFile.schedule.merge-schedule-limit
      ## The number of the Region Merge scheduling tasks performed at the same time.
      ## Set this parameter to 0 to disable Region Merge.
      ##
      # merge-schedule-limit: 8
      ## @param pd.configFile.schedule.hot-region-schedule-limit
      ## The number of hot Region scheduling tasks performed at the same time.
      ##
      # hot-region-schedule-limit: 4
      ## @param pd.configFile.schedule.leader-schedule-policy
      ## The policy to schedule Leader tasks. Optional values: ["count", "size"], default: "count"
      ##
      # leader-schedule-policy: "count"
      ## @param pd.configFile.schedule.tolerant-size-ratio
      ## When the score difference between the leader or Region of the two stores is
      ## less than specified multiple times of the Region size, it is considered in balance by PD.
      ## If it equals 0.0, PD will automatically adjust it.
      ##
      # tolerant-size-ratio: 0.0
      ## @param pd.configFile.schedule.low-space-ratio
      ## The threshold ratio above which the capacity of the store is insufficient.
      ## If the space occupancy ratio of a store exceeds this threshold value,
      ## PD avoids migrating data to this store as much as possible.
      ##
      # low-space-ratio: 0.8
      ## @param pd.configFile.schedule.region-score-formula-version
      ## The default version of balance Region score calculation.
      # region-score-formula-version: "v2"
      ## @param pd.configFile.schedule.enable-one-way-merge
      ## These three parameters control the merge scheduler behavior.
      ## If it is true, it means a Region can only be merged into the next Region of it.
      # enable-one-way-merge: false
      ## @param pd.configFile.schedule.enable-cross-table-merge
      ## If it is true, it means two Regions within different tables can be merged.
      ## This option only works when the key type is "table".
      ##
      # enable-cross-table-merge: false
      ## @param pd.configFile.schedule.enable-joint-consensus
      ## Whether or not to enable joint consensus.
      ##
      # enable-joint-consensus: true

    replication:
      ## @param pd.configFile.schedule.max-replicas
      ## The number of replicas for each Region.
      ##
      # max-replicas: 3
      ## @param pd.configFile.schedule.location-labels
      ## The label keys specified the location of a store.
      ## The placement priorities are implied by the order of label keys.
      ## For example, ["zone", "rack"] means that we should place replicas to
      ## different zones first, then to different racks if we don't have enough zones.
      ##
      # location-labels: []
      ## @param pd.configFile.schedule.strictly-match-label
      ## Strictly checks if the label of TiKV is matched with location labels.
      ##
      # strictly-match-label: false
      ## @param pd.configFile.schedule.isolation-level
      ## isolation-level is used to isolate replicas explicitly and forcibly if it's not empty.
      ## Its value must be empty or one of location-labels.
      ## Example:
      ## location-labels: ["zone", "rack", "host"]
      ## isolation-level: "zone"
      ## With configuration like above, PD ensures that all replicas be placed in different zones.
      ## Even if a zone is down, PD will not try to make up replicas in other zone
      ## because other zones already have replicas on it.
      ##
      # isolation-level: ""
      ## @param pd.configFile.schedule.enable-placement-rules
      ## Whether or not to enable placement rules.
      ##
      # enable-placement-rules: true
    ## @param pd.configFile.dashboard Configurations for the TiDB Dashboard embedded in the PD.
    ## Configurations below are for the TiDB Dashboard embedded in the PD.
    ##
    dashboard:
      ## @param pd.configFile.dashboard.cacert-path The path of the CA certificate used to verify the TiDB server in TLS.
      ## @param pd.configFile.dashboard.cert-path The path of the certificate used to connect to TiDB server in TLS.
      ## @param pd.configFile.dashboard.key-path The path of the certificate private key.
      ##
      tidb-cacert-path: null
      tidb-cert-path: null
      tidb-key-path: null
      ## @param pd.configFile.dashboard.public-path-prefix The public path prefix to serve Dashboard URLs. It can be set when Dashboard
      ## is running behind a reverse proxy. Do not configure it if you access
      ## Dashboard directly.
      ##
      public-path-prefix: "/dashboard"
      ## @param pd.configFile.dashboard.internal-proxy
      ## When enabled, the request will be proxied to the instance running Dashboard
      ## internally instead of result in a 307 redirection.
      ##
      internal-proxy: false
      ## @param pd.configFile.dashboard.enable-telemetry
      ## When enabled, usage data will be sent to PingCAP for improving user experience.
      ##
      enable-telemetry: false
      ## @param pd.configFile.dashboard.disable-custom-prom-addr
      ## When enabled, configuring a custom prometheus address through Dashboard will not be allowed.
      ##
      disable-custom-prom-addr: false
    keyspace:
      ## @param pd.configFile.keyspace.pre-alloc
      ## pre-alloc is used to pre-allocate keyspaces during pd bootstrap.
      ## Its value should be a list of strings, denoting the name of the keyspaces.
      ## Example:
      ## pre-alloc: ["admin", "user1", "user2"]
      ##
      # pre-alloc: []
  ## @param pd.secret secret pass to the container
  ##
  secret:
    ## @param pd.secret.envVars secret content pass to container via environment variable
    ## e.g.
    ## envVars:
    ##   SECRET_KEY1: secret_value1
    ##   SECRET_KEY2: secret_value2
    ##
    envVars: {}
    ## @param pd.secret.tls secret setting of cert and key or whatever tls content will set in the container
    ## @param pd.secret.tls.mountPath secret mount path setting of cert and key or whatever tls content will set in the container
    ##
    tls:
      mountPath: /etc/pd/pki
      ## @param pd.secret.tls.contents secret content of cert and key or whatever tls content will set in the container
      ## You can set the content key as whatever file name you like
      ## But the tls set in configFile above must match with the settings here
      ## key and certificate should start with -----BEGIN CERTIFICATE----- or -----BEGIN RSA PRIVATE KEY-----
      ## e.g.
      ## contents:
      ##  ca.pem: ""
      ##  server-1.pem: ""
      ##  server-1-key.pem: ""
      ##
      contents: {}

  ## @param pd.existingConfigmap The name of an existing ConfigMap with your custom configuration for PD
  ##
  existingConfigmap:
  ## @param pd.command Override default container command (useful when using custom images)
  ##
  command: []
  ## @param pd.args Override default container args (useful when using custom images)
  ##
  args:
    - "--config"
    - "/etc/pd/config.toml"
  ## @param pd.automountServiceAccountToken Mount Service Account token in PD pods
  ##
  automountServiceAccountToken: false
  ## @param pd.hostAliases PD pods host aliases
  ## https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
  ##
  hostAliases: []
  ## @param pd.deploymentAnnotations Annotations for PD deployment
  ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  ##
  deploymentAnnotations: {}
  ## @param pd.podLabels Extra labels for PD pods
  ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
  ##
  podLabels: {}
  ## @param pd.podAnnotations Annotations for PD pods
  ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  ##
  podAnnotations: {}
  ## @param pd.podAffinityPreset Pod affinity preset. Ignored if `pd.affinity` is set. Allowed values: `soft` or `hard`
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  podAffinityPreset: ""
  ## @param pd.podAntiAffinityPreset Pod anti-affinity preset. Ignored if `pd.affinity` is set. Allowed values: `soft` or `hard`
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  podAntiAffinityPreset: soft
  ## Node pd.affinity preset
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity
  ##
  nodeAffinityPreset:
    ## @param pd.nodeAffinityPreset.type Node affinity preset type. Ignored if `pd.affinity` is set. Allowed values: `soft` or `hard`
    ##
    type: ""
    ## @param pd.nodeAffinityPreset.key Node label key to match. Ignored if `pd.affinity` is set
    ##
    key: ""
    ## @param pd.nodeAffinityPreset.values Node label values to match. Ignored if `pd.affinity` is set
    ## E.g.
    ## values:
    ##   - e2e-az1
    ##   - e2e-az2
    ##
    values: []
  ## @param pd.affinity Affinity for PD pods assignment
  ## ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  ## NOTE: `pd.podAffinityPreset`, `pd.podAntiAffinityPreset`, and `pd.nodeAffinityPreset` will be ignored when it's set
  ##
  affinity: {}
  ## @param pd.nodeSelector Node labels for PD pods assignment
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  ##
  nodeSelector: {}
  ## @param pd.tolerations Tolerations for PD pods assignment
  ## ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  ##
  tolerations: []
  ## ONLY FOR DEPLOYMENTS:
  ## @param pd.updateStrategy.type PD deployment strategy type
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
  ## ONLY FOR STATEFULSETS:
  ## @param pd.updateStrategy.type PD statefulset strategy type
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
  ##
  updateStrategy:
    ## ONLY FOR DEPLOYMENTS:
    ## Can be set to RollingUpdate or Recreate
    ## ONLY FOR STATEFULSETS:
    ## Can be set to RollingUpdate or OnDelete
    ##
    type: RollingUpdate
  ## @param pd.priorityClassName PD pods' priorityClassName
  ##
  priorityClassName: ""
  ## @param pd.topologySpreadConstraints Topology Spread Constraints for PD pod assignment spread across your cluster among failure-domains
  ## Ref: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/#spread-constraints-for-pods
  ##
  topologySpreadConstraints: []
  ## @param pd.schedulerName Name of the k8s scheduler (other than default) for PD pods
  ## ref: https://kubernetes.io/docs/tasks/administer-cluster/configure-multiple-schedulers/
  ##
  schedulerName: ""
  ## @param pd.terminationGracePeriodSeconds Seconds PD pods need to terminate gracefully
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/pod/#termination-of-pods
  ##
  terminationGracePeriodSeconds: ""
  ## @param pd.lifecycleHooks for PD containers to automate configuration before or after startup
  ##
  lifecycleHooks: {}
  ## @param pd.extraEnvVars Array with extra environment variables to add to PD containers
  ## e.g:
  ## extraEnvVars:
  ##   - name: FOO
  ##     value: "bar"
  ##
  extraEnvVars: []
  ## @param pd.extraEnvVarsCM Name of existing ConfigMap containing extra env vars for PD containers
  ##
  extraEnvVarsCM: ""
  ## @param pd.extraEnvVarsSecret Name of existing Secret containing extra env vars for PD containers
  ##
  extraEnvVarsSecret: ""
  ## @param pd.extraVolumes Optionally specify extra list of additional volumes for the PD pods
  ##
  extraVolumes: []
  ## @param pd.extraVolumeMounts Optionally specify extra list of additional volumeMounts for the PD containers
  ##
  extraVolumeMounts: []
  ## @param pd.sidecars Add additional sidecar containers to the PD pods
  ## e.g:
  ## sidecars:
  ##   - name: your-image-name
  ##     image: your-image
  ##     imagePullPolicy: Always
  ##     ports:
  ##       - name: portname
  ##         containerPort: 1234
  ##
  sidecars: []
  ## @param pd.initContainers Add additional init containers to the PD pods
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
  ## e.g:
  ## initContainers:
  ##  - name: your-image-name
  ##    image: your-image
  ##    imagePullPolicy: Always
  ##    command: ['sh', '-c', 'echo "hello world"']
  ##
  initContainers: []

## @section Persistence Parameters
##

## Enable persistence using Persistent Volume Claims
## ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
##
persistence:
  ## @param persistence.enabled Enable persistence using Persistent Volume Claims
  ##
  enabled: true
  ## @param persistence.mountPath Path to mount the volume at.
  ##
  mountPath: /data
  ## @param persistence.subPath The subdirectory of the volume to mount to, useful in dev environments and one PV for multiple services
  ##
  subPath: ""
  ## @param persistence.storageClass Storage class of backing PVC
  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  storageClass: ""
  ## @param persistence.annotations Persistent Volume Claim annotations
  ##
  annotations: {}
  ## @param persistence.accessModes Persistent Volume Access Modes
  ##
  accessModes:
    - ReadWriteOnce
  ## @param persistence.size Size of data volume
  ##
  size: 8Gi
  ## @param persistence.dataSource Custom PVC data source
  ##
  dataSource: {}
  ## @param persistence.existingClaim The name of an existing PVC to use for persistence
  ##
  existingClaim: ""
  ## @param persistence.selector Selector to match an existing Persistent Volume for pd data PVC
  ## If set, the PVC can't have a PV dynamically provisioned for it
  ## E.g.
  ## selector:
  ##   matchLabels:
  ##     app: my-app
  ##
  selector: {}
## @section Init Container Parameters
##

## @section Default init containers Parameters

defaultInitContainers:
  ## 'volume-permissions' init container
  ## Changes the owner and group of the persistent volume mount(s) point(s) to runAsUser:fsGroup values
  ##   based on the *podSecurityContext/*containerSecurityContext parameters
  ##
  volumePermissions:
    ## @param defaultInitContainers.volumePermissions.enabled Enable init container that adapts the owner/group of the PV mount(s) point(s)
    ##
    enabled: false
    ## OS Shell + Utility image
    ## ref: https://hub.docker.com/r/bitnami/os-shell
    ## @param defaultInitContainers.volumePermissions.image.registry [default: REGISTRY_NAME] "volume-permissions" init-containers' image registry
    ## @param defaultInitContainers.volumePermissions.image.repository [default: REPOSITORY_NAME/os-shell] "volume-permissions" init-containers' image repository
    ## @skip defaultInitContainers.volumePermissions.image.tag "volume-permissions" init-containers' image tag (immutable tags are recommended)
    ## @param defaultInitContainers.volumePermissions.image.digest "volume-permissions" init-containers' image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
    ## @param defaultInitContainers.volumePermissions.image.pullPolicy "volume-permissions" init-containers' image pull policy
    ## @param defaultInitContainers.volumePermissions.image.pullSecrets "volume-permissions" init-containers' image pull secrets
    ##
    image:
      registry: docker.io
      repository: bitnami/os-shell
      tag: 12-debian-12-r46
      digest: ""
      pullPolicy: IfNotPresent
      ## Optionally specify an array of imagePullSecrets.
      ## Secrets must be manually created in the namespace.
      ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
      ## Example:
      ## pullSecrets:
      ##   - myRegistryKeySecretName
      ##
      pullSecrets: []
    ## Configure "volume-permissions" init-container Security Context
    ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container
    ## @param defaultInitContainers.volumePermissions.containerSecurityContext.enabled Enabled "volume-permissions" init-containers' Security Context
    ## @param defaultInitContainers.volumePermissions.containerSecurityContext.seLinuxOptions [object,nullable] Set SELinux options in "volume-permissions" init-containers
    ## @param defaultInitContainers.volumePermissions.containerSecurityContext.runAsUser Set runAsUser in "volume-permissions" init-containers' Security Context
    ## NOTE: when runAsUser is set to special value "auto", init container will try to chown the
    ##   data folder to auto-determined user&group, using commands: `id -u`:`id -G | cut -d" " -f2`
    ##   "auto" is especially useful for OpenShift which has scc with dynamic user ids (and 0 is not allowed)
    ## @param defaultInitContainers.volumePermissions.containerSecurityContext.privileged Set privileged in "volume-permissions" init-containers' Security Context
    ## @param defaultInitContainers.volumePermissions.containerSecurityContext.allowPrivilegeEscalation Set allowPrivilegeEscalation in "volume-permissions" init-containers' Security Context
    ## @param defaultInitContainers.volumePermissions.containerSecurityContext.capabilities.add List of capabilities to be added in "volume-permissions" init-containers
    ## @param defaultInitContainers.volumePermissions.containerSecurityContext.capabilities.drop List of capabilities to be dropped in "volume-permissions" init-containers
    ## @param defaultInitContainers.volumePermissions.containerSecurityContext.seccompProfile.type Set seccomp profile in "volume-permissions" init-containers
    ##
    containerSecurityContext:
      enabled: true
      seLinuxOptions: {}
      runAsUser: 0
      privileged: false
      allowPrivilegeEscalation: false
      capabilities:
        add: []
        drop: ["ALL"]
      seccompProfile:
        type: "RuntimeDefault"
    ## "volume-permissions" init container resource requests and limits
    ## ref: http://kubernetes.io/docs/concepts/configuration/manage-compute-resources-container/
    ## @param defaultInitContainers.volumePermissions.resourcesPreset Set "volume-permissions" init container resources according to one common preset (allowed values: none, nano, micro, small, medium, large, xlarge, 2xlarge). This is ignored if defaultInitContainers.volumePermissions.resources is set (defaultInitContainers.volumePermissions.resources is recommended for production).
    ## More information: https://github.com/bitnami/charts/blob/main/bitnami/common/templates/_resources.tpl#L15
    ##
    resourcesPreset: "nano"
    ## @param defaultInitContainers.volumePermissions.resources Set "volume-permissions" init container requests and limits for different resources like CPU or memory (essential for production workloads)
    ## E.g:
    ## resources:
    ##   requests:
    ##     cpu: 2
    ##     memory: 512Mi
    ##   limits:
    ##     cpu: 3
    ##     memory: 1024Mi
    ##
    resources: {}

